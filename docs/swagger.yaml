      categories:
        items:
          $ref: '#/definitions/auto-store-api_internal_models.Category'
        type: array
      compatibilities:
        items:
          $ref: '#/definitions/auto-store-api_internal_models.VehicleCompatibility'
        type: array
      condition:
        $ref: '#/definitions/auto-store-api_internal_models.ProductCondition'
      cost_price:
        type: number
      created_at:
        type: string
      description:
        type: string
      dimensions:
        type: string
      id:
        type: string
      images:
        items:
          $ref: '#/definitions/auto-store-api_internal_models.ProductImage'
        type: array
      manufacturer_part_number:
        type: string
      name:
        type: string
      price:
        type: number
      reviews:
        items:
          $ref: '#/definitions/auto-store-api_internal_models.Review'
        type: array
      sku:
        type: string
      specifications:
        items:
          $ref: '#/definitions/auto-store-api_internal_models.Specification'
        type: array
      stock_quantity:
        type: integer
      tags:
        items:
          $ref: '#/definitions/auto-store-api_internal_models.Tag'
        type: array
      updated_at:
        type: string
      warranty_months:
        type: integer
      weight:
        type: number
    type: object
  auto-store-api_internal_models.ProductCondition:
    enum:
    - new
    - refurbished
    - used
    type: string
    x-enum-varnames:
    - ConditionNew
    - ConditionRefurbished
    - ConditionUsed
  auto-store-api_internal_models.ProductImage:
    properties:
      alt_text:
        type: string
      created_at:
        type: string
      display_order:
        type: integer
      id:
        type: string
      is_primary:
        type: boolean
      product_id:
        type: string
      updated_at:
        type: string
      url:
        type: string
