basePath: /
definitions:
  auto-store-api_internal_handlers_dto.AddCartItemRequest:
    properties:
      product_id:
        type: string
      quantity:
        minimum: 1
        type: integer
    required:
    - product_id
    - quantity
    type: object
  auto-store-api_internal_handlers_dto.AddProductImagesRequest:
    properties:
      images:
        items:
          $ref: '#/definitions/auto-store-api_internal_handlers_dto.ProductImageItem'
        minItems: 1
        type: array
    required:
    - images
    type: object
  auto-store-api_internal_handlers_dto.AddVehicleCompatibilitiesRequest:
    properties:
      compatibilities:
        items:
          $ref: '#/definitions/auto-store-api_internal_handlers_dto.VehicleCompatibilityItem'
        minItems: 1
        type: array
    required:
    - compatibilities
    type: object
  auto-store-api_internal_handlers_dto.AuthResponse:
    properties:
      access_token:
        type: string
      expires_at:
        type: string
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/auto-store-api_internal_handlers_dto.UserResponse'
    type: object
  auto-store-api_internal_handlers_dto.BatchProductError:
    properties:
      index:
        type: integer
      message:
        type: string
      sku:
        type: string
    type: object
  auto-store-api_internal_handlers_dto.BatchProductResult:
    properties:
      index:
        type: integer
      product:
        $ref: '#/definitions/auto-store-api_internal_models.Product'
    type: object
  auto-store-api_internal_handlers_dto.CreateAddressRequest:
    properties:
      city:
        maxLength: 100
        type: string
      country:
        maxLength: 100
        type: string
      is_default:
        type: boolean
      postal_code:
        maxLength: 20
        type: string
      state:
        maxLength: 100
        type: string
      street:
        maxLength: 255
        type: string
      type:
        enum:
        - shipping
        - billing
        type: string
    required:
    - city
    - country
    - street
    - type
    type: object
  auto-store-api_internal_handlers_dto.CreateCategoryRequest:
    properties:
      description:
        type: string
      name:
        maxLength: 100
        type: string
      parent_id:
        type: string
      slug:
        type: string
    required:
    - name
    type: object
  auto-store-api_internal_handlers_dto.CreateOrderRequest:
    properties:
      billing_address_id:
        type: string
      payment_method:
        maxLength: 50
        type: string
      shipping_address_id:
        type: string
    required:
    - billing_address_id
    - payment_method
    - shipping_address_id
    type: object
  auto-store-api_internal_handlers_dto.CreateProductRequest:
    properties:
      brand:
        maxLength: 100
        type: string
      category_ids:
        items:
          type: string
        type: array
      condition:
        enum:
        - new
        - refurbished
        - used
        type: string
      cost_price:
        minimum: 0
        type: number
      description:
        type: string
      dimensions:
        maxLength: 100
        type: string
      manufacturer_part_number:
        maxLength: 100
        type: string
      name:
        maxLength: 255
        type: string
      price:
        type: number
      sku:
        maxLength: 100
        type: string
      stock_quantity:
        minimum: 0
        type: integer
      tag_ids:
        items:
          type: string
        type: array
      warranty_months:
        minimum: 0
        type: integer
      weight:
        minimum: 0
        type: number
    required:
    - name
    - price
    - sku
    type: object
  auto-store-api_internal_handlers_dto.CreateProductsBatchRequest:
    properties:
      products:
        items:
          $ref: '#/definitions/auto-store-api_internal_handlers_dto.CreateProductRequest'
        type: array
    required:
    - products
    type: object
  auto-store-api_internal_handlers_dto.CreateProductsBatchResponse:
    properties:
      created:
        items:
          $ref: '#/definitions/auto-store-api_internal_handlers_dto.BatchProductResult'
        type: array
      failed:
        items:
          $ref: '#/definitions/auto-store-api_internal_handlers_dto.BatchProductError'
        type: array
    type: object
  auto-store-api_internal_handlers_dto.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  auto-store-api_internal_handlers_dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  auto-store-api_internal_handlers_dto.ProductImageItem:
    properties:
      alt_text:
        maxLength: 255
        type: string
      display_order:
        type: integer
      is_primary:
        type: boolean
      url:
        type: string
    required:
    - url
    type: object
  auto-store-api_internal_handlers_dto.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  auto-store-api_internal_handlers_dto.RegisterRequest:
    properties:
      email:
        type: string
      first_name:
        maxLength: 100
        type: string
      last_name:
        maxLength: 100
        type: string
      password:
        minLength: 8
        type: string
      phone:
        type: string
    required:
    - email
    - password
    type: object
  auto-store-api_internal_handlers_dto.ResetPasswordRequest:
    properties:
      new_password:
        minLength: 8
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  auto-store-api_internal_handlers_dto.UpdateAddressRequest:
    properties:
      city:
        type: string
      country:
        type: string
      is_default:
        type: boolean
      postal_code:
        type: string
      state:
        type: string
      street:
        type: string
    type: object
  auto-store-api_internal_handlers_dto.UpdateCartItemRequest:
    properties:
      quantity:
        minimum: 1
        type: integer
    required:
    - quantity
    type: object
  auto-store-api_internal_handlers_dto.UpdateCategoryRequest:
    properties:
      description:
        type: string
      name:
        type: string
      parent_id:
        type: string
      slug:
        type: string
    type: object
  auto-store-api_internal_handlers_dto.UpdateOrderStatusRequest:
    properties:
      status:
        enum:
        - pending
        - confirmed
        - processing
        - shipped
        - delivered
        - cancelled
        type: string
    required:
    - status
    type: object
  auto-store-api_internal_handlers_dto.UpdateProductRequest:
    properties:
      brand:
        type: string
      category_ids:
        items:
          type: string
        type: array
      condition:
        type: string
      cost_price:
        type: number
      description:
        type: string
      dimensions:
        type: string
      manufacturer_part_number:
        type: string
      name:
        type: string
      price:
        type: number
      stock_quantity:
        type: integer
      tag_ids:
        items:
          type: string
        type: array
      warranty_months:
        type: integer
      weight:
        type: number
    type: object
  auto-store-api_internal_handlers_dto.UpdateProfileRequest:
    properties:
      first_name:
        type: string
      last_name:
        type: string
      phone:
        type: string
    type: object
  auto-store-api_internal_handlers_dto.UpdateRoleRequest:
    properties:
      role:
        enum:
        - ADMIN
        - VENDOR
        - CUSTOMER
        type: string
    required:
    - role
    type: object
  auto-store-api_internal_handlers_dto.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      email_verified:
        type: boolean
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      phone:
        type: string
      role:
        type: string
    type: object
  auto-store-api_internal_handlers_dto.VehicleCompatibilityItem:
    properties:
      engine:
        maxLength: 100
        type: string
      make:
        maxLength: 100
        type: string
      model:
        maxLength: 100
        type: string
      notes:
        maxLength: 500
        type: string
      trim:
        maxLength: 100
        type: string
      year_end:
        description: 0 = unspecified
        type: integer
      year_start:
        description: 0 = unspecified
        type: integer
    required:
    - make
    - model
    type: object
  auto-store-api_internal_handlers_dto.VerifyEmailRequest:
    properties:
      token:
        type: string
    required:
    - token
    type: object
  auto-store-api_internal_models.Address:
    properties:
      city:
        type: string
      country:
        type: string
      created_at:
        type: string
      id:
        type: string
      is_default:
        type: boolean
      postal_code:
        type: string
      state:
        type: string
      street:
        type: string
      type:
        $ref: '#/definitions/auto-store-api_internal_models.AddressType'
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  auto-store-api_internal_models.AddressType:
    enum:
    - shipping
    - billing
    type: string
    x-enum-varnames:
    - AddressShipping
    - AddressBilling
  auto-store-api_internal_models.Category:
    properties:
      children:
        items:
          $ref: '#/definitions/auto-store-api_internal_models.Category'
        type: array
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      level:
        type: integer
      name:
        type: string
      parent:
        $ref: '#/definitions/auto-store-api_internal_models.Category'
      parent_id:
        type: string
      products:
        items:
          $ref: '#/definitions/auto-store-api_internal_models.Product'
        type: array
      slug:
        type: string
      updated_at:
        type: string
    type: object
  auto-store-api_internal_models.Product:
    properties:
      brand:
