        type: string
      id:
        type: string
      product:
        $ref: '#/definitions/auto-store-api_internal_models.Product'
      product_id:
        type: string
      rating:
        type: integer
      title:
        type: string
      updated_at:
        type: string
      user:
        $ref: '#/definitions/auto-store-api_internal_models.User'
      user_id:
        type: string
