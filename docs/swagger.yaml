host: localhost:8080
info:
  contact: {}
  description: Production-ready RESTful API for an auto-parts e-commerce platform.
  title: Auto-Store API
  version: "1.0"
paths:
  /api/v1/admin/orders:
    get:
      parameters:
      - description: Page
        in: query
        name: page
        type: integer
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Order status
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auto-store-api_internal_utils.APIResponse'
      security:
      - BearerAuth: []
      summary: List all orders (Admin)
      tags:
      - admin
  /api/v1/admin/orders/{id}/status:
    put:
      consumes:
      - application/json
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      - description: Status
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auto-store-api_internal_handlers_dto.UpdateOrderStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/auto-store-api_internal_utils.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/auto-store-api_internal_utils.APIResponse'
      security:
      - BearerAuth: []
      summary: Update order status (Admin)
      tags:
      - admin
  /api/v1/admin/users/{id}/role:
    put:
      consumes:
      - application/json
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Role (ADMIN, VENDOR, CUSTOMER)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auto-store-api_internal_handlers_dto.UpdateRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auto-store-api_internal_handlers_dto.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/auto-store-api_internal_utils.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/auto-store-api_internal_utils.APIResponse'
      security:
      - BearerAuth: []
      summary: Update user role (Admin only)
      tags:
      - users
  /api/v1/auth/forgot-password:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auto-store-api_internal_handlers_dto.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auto-store-api_internal_utils.APIResponse'
      summary: Request password reset
      tags:
      - auth
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auto-store-api_internal_handlers_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auto-store-api_internal_handlers_dto.AuthResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/auto-store-api_internal_utils.APIResponse'
      summary: User login
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: User logout
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auto-store-api_internal_handlers_dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auto-store-api_internal_handlers_dto.AuthResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/auto-store-api_internal_utils.APIResponse'
      summary: Refresh access token
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Registration data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auto-store-api_internal_handlers_dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/auto-store-api_internal_handlers_dto.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/auto-store-api_internal_utils.APIResponse'
      summary: Register a new user
      tags:
      - auth
  /api/v1/auth/reset-password:
    post:
      consumes:
      - application/json
      parameters:
      - description: Token and new password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auto-store-api_internal_handlers_dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auto-store-api_internal_utils.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/auto-store-api_internal_utils.APIResponse'
      summary: Reset password with token
      tags:
      - auth
  /api/v1/auth/verify-email:
    post:
      consumes:
      - application/json
      parameters:
      - description: Verification token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auto-store-api_internal_handlers_dto.VerifyEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auto-store-api_internal_utils.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/auto-store-api_internal_utils.APIResponse'
      summary: Verify email address
      tags:
      - auth
  /api/v1/cart:
    delete:
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Clear cart
      tags:
      - cart
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: object
            type: array
      security:
      - BearerAuth: []
      summary: Get user's cart
      tags:
      - cart
  /api/v1/cart/items:
    post:
      consumes:
      - application/json
      parameters:
      - description: Cart item
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auto-store-api_internal_handlers_dto.AddCartItemRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/auto-store-api_internal_utils.APIResponse'
      security:
      - BearerAuth: []
      summary: Add item to cart
      tags:
      - cart
  /api/v1/cart/items/{id}:
    delete:
      parameters:
      - description: Cart item ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/auto-store-api_internal_utils.APIResponse'
      security:
      - BearerAuth: []
      summary: Remove item from cart
      tags:
      - cart
    put:
      consumes:
      - application/json
      parameters:
      - description: Cart item ID
        in: path
        name: id
        required: true
        type: string
      - description: Quantity
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auto-store-api_internal_handlers_dto.UpdateCartItemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auto-store-api_internal_utils.APIResponse'
        "400":
